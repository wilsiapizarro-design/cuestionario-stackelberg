<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuestionario — Modelo de Stackelberg</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --purple: #534AB7;
    --purple-light: #EEEDFE;
    --purple-mid: #7F77DD;
    --purple-dark: #3C3489;
    --teal-light: #E1F5EE;
    --teal-dark: #085041;
    --teal-mid: #0F6E56;
    --red-light: #FCEBEB;
    --red-dark: #791F1F;
    --red-mid: #A32D2D;
    --gray-bg: #f8f7f4;
    --gray-card: #ffffff;
    --gray-border: rgba(0,0,0,0.1);
    --gray-muted: #6b6966;
    --text: #1a1a18;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--gray-bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }

  .page-header {
    width: 100%;
    max-width: 680px;
    margin-bottom: 2rem;
  }

  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--purple-dark);
    background: var(--purple-light);
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 10px;
  }

  .page-header h1 {
    font-size: 26px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  .page-header p {
    font-size: 14px;
    color: var(--gray-muted);
    margin-top: 6px;
  }

  .progress-wrap {
    width: 100%;
    max-width: 680px;
    margin-bottom: 1.5rem;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--gray-muted);
    margin-bottom: 8px;
  }

  .progress-bar-bg {
    height: 6px;
    background: rgba(0,0,0,0.08);
    border-radius: 6px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 6px;
    background: var(--purple);
    border-radius: 6px;
    transition: width 0.4s ease;
  }

  .card {
    width: 100%;
    max-width: 680px;
    background: var(--gray-card);
    border: 1px solid var(--gray-border);
    border-radius: var(--radius);
    padding: 1.75rem;
    margin-bottom: 1rem;
  }

  .q-num {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .07em;
    color: var(--purple);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .q-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  .tag-teoria { background: var(--purple-light); color: var(--purple-dark); }
  .tag-grafico { background: var(--teal-light); color: var(--teal-dark); }

  .q-text {
    font-size: 15px;
    font-weight: 500;
    line-height: 1.65;
    color: var(--text);
    margin-bottom: 1.25rem;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .opt-btn {
    background: var(--gray-bg);
    border: 1px solid var(--gray-border);
    border-radius: var(--radius-sm);
    padding: 11px 15px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    color: var(--text);
    text-align: left;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    line-height: 1.5;
  }

  .opt-btn:hover:not(:disabled) {
    background: #f0effe;
    border-color: var(--purple-mid);
    transform: translateX(2px);
  }

  .opt-btn.correct {
    background: var(--teal-light);
    border-color: var(--teal-mid);
    color: var(--teal-dark);
    font-weight: 500;
  }

  .opt-btn.wrong {
    background: var(--red-light);
    border-color: var(--red-mid);
    color: var(--red-dark);
  }

  .opt-btn:disabled { cursor: default; transform: none; }

  .feedback {
    margin-top: 14px;
    padding: 11px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    line-height: 1.6;
  }

  .feedback.ok {
    background: var(--teal-light);
    color: var(--teal-dark);
    border-left: 3px solid var(--teal-mid);
  }

  .feedback.ko {
    background: var(--red-light);
    color: var(--red-dark);
    border-left: 3px solid var(--red-mid);
  }

  .nav-bar {
    width: 100%;
    max-width: 680px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 0.5rem;
  }

  .nav-btn {
    background: white;
    border: 1px solid var(--gray-border);
    border-radius: var(--radius-sm);
    padding: 9px 20px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    color: var(--text);
    cursor: pointer;
    font-weight: 500;
    transition: background 0.15s, border-color 0.15s;
  }

  .nav-btn:hover:not(:disabled) {
    background: var(--purple-light);
    border-color: var(--purple-mid);
    color: var(--purple-dark);
  }

  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  .nav-btn.primary {
    background: var(--purple);
    color: white;
    border-color: var(--purple);
  }

  .nav-btn.primary:hover:not(:disabled) {
    background: var(--purple-dark);
    border-color: var(--purple-dark);
    color: white;
  }

  .q-counter { font-size: 13px; color: var(--gray-muted); font-weight: 500; }

  /* Resultado */
  .result-card {
    width: 100%;
    max-width: 680px;
    background: white;
    border: 1px solid var(--gray-border);
    border-radius: var(--radius);
    padding: 3rem 2rem;
    text-align: center;
  }

  .score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: var(--purple-light);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
    border: 3px solid var(--purple-mid);
  }

  .score-num { font-size: 38px; font-weight: 700; color: var(--purple); line-height: 1; }
  .score-den { font-size: 14px; color: var(--purple-mid); font-weight: 500; }

  .result-msg {
    font-size: 15px;
    color: var(--text);
    line-height: 1.7;
    max-width: 440px;
    margin: 0 auto 2rem;
  }

  .result-subtitle {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 1rem;
  }

  .restart-btn {
    background: var(--purple);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    padding: 11px 28px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }

  .restart-btn:hover { background: var(--purple-dark); }

  .score-bars {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .score-bar-item {
    background: var(--gray-bg);
    border-radius: var(--radius-sm);
    padding: 10px 18px;
    text-align: center;
    min-width: 120px;
  }

  .score-bar-label { font-size: 11px; color: var(--gray-muted); font-weight: 500; text-transform: uppercase; letter-spacing: .05em; }
  .score-bar-val { font-size: 22px; font-weight: 600; color: var(--text); margin-top: 2px; }

  @media (max-width: 500px) {
    .card { padding: 1.25rem; }
    .page-header h1 { font-size: 21px; }
  }
</style>
</head>
<body>

<div class="page-header">
  <div class="badge">Organización Industrial · UCN</div>
  <h1>Modelo de Stackelberg</h1>
  <p>Cuestionario de práctica — 10 preguntas · 6 teoría + 4 gráfico</p>
</div>

<div class="progress-wrap">
  <div class="progress-meta">
    <span id="prog-label">Pregunta 1 de 10</span>
    <span id="prog-pct">10%</span>
  </div>
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="prog-fill" style="width:10%"></div>
  </div>
</div>

<div id="quiz-area"></div>

<div class="nav-bar" id="nav-bar">
  <button class="nav-btn" id="prev-btn" onclick="navigate(-1)" disabled>← Anterior</button>
  <span class="q-counter" id="q-counter">1 / 10</span>
  <button class="nav-btn primary" id="next-btn" onclick="navigate(1)" disabled>Siguiente →</button>
</div>

<script>
const QS = [
  {
    tag: "teoria",
    q: "¿Cuál es la diferencia fundamental entre el modelo de Stackelberg y el modelo de Cournot?",
    opts: [
      "En Cournot una empresa tiene costos más bajos que la otra",
      "En Stackelberg las decisiones son secuenciales: el líder elige primero y el seguidor reacciona después",
      "En Stackelberg ambas empresas deciden al mismo tiempo",
      "En Cournot existe un líder que produce antes que el resto"
    ],
    ans: 1,
    exp: "Stackelberg es un juego secuencial. El líder elige q₁ primero de forma irreversible; el seguidor observa esa cantidad y luego elige q₂. Cournot es simultáneo: ninguna empresa conoce la decisión de la otra al momento de decidir."
  },
  {
    tag: "teoria",
    q: "En el modelo de Stackelberg, ¿qué empresa se denomina 'líder'?",
    opts: [
      "La empresa con mayores costos marginales",
      "La empresa que decide su cantidad de producción en primer lugar",
      "La empresa que maximiza el bienestar social",
      "La empresa que fija el precio de mercado directamente"
    ],
    ans: 1,
    exp: "El líder es la empresa que toma la decisión de producción primero, de manera irreversible, obligando a la seguidora a reaccionar. Una vez que elige q₁, no puede cambiar esa decisión."
  },
  {
    tag: "teoria",
    q: "¿Por qué existe una 'ventaja del primer movedor' en Stackelberg?",
    opts: [
      "Porque el líder puede cambiar su decisión después de ver qué hace el seguidor",
      "Porque el líder se compromete de forma creíble con una cantidad mayor, forzando al seguidor a producir menos",
      "Porque el seguidor siempre produce la cantidad de competencia perfecta",
      "Porque el líder tiene menores costos marginales que el seguidor"
    ],
    ans: 1,
    exp: "Al comprometerse irreversiblemente con una cantidad alta, el líder sabe que el seguidor reaccionará reduciéndola según su función de reacción negativa. Eso le da al líder mayor cuota de mercado y mayores beneficios que en Cournot."
  },
  {
    tag: "teoria",
    q: "¿Qué ocurre con los beneficios del seguidor en Stackelberg comparado con el equilibrio de Cournot?",
    opts: [
      "El seguidor gana más que en Cournot porque conoce la decisión del líder",
      "El seguidor gana lo mismo que en Cournot",
      "El seguidor gana menos que en Cournot porque reaccionar siempre es costoso",
      "El seguidor no obtiene beneficios en Stackelberg"
    ],
    ans: 2,
    exp: "La regla de beneficios es: π₁*(S) > π₁*(Cournot) > π₂*(S) > π₂*(Cournot). El seguidor siempre gana menos que en Cournot. Siempre conviene ser el líder, nunca el seguidor."
  },
  {
    tag: "teoria",
    q: "¿Cómo maximiza su beneficio la empresa seguidora en Stackelberg?",
    opts: [
      "Igual que en Cournot: resuelve su función de reacción dado lo que cree que producirá el líder",
      "Produce la cantidad de monopolio independientemente del líder",
      "Observa el valor real de q₁ del líder y elige su mejor respuesta q₂*(q₁)",
      "Copia exactamente la cantidad producida por el líder"
    ],
    ans: 2,
    exp: "La seguidora observa la cantidad real q_L del líder (no una expectativa) y luego elige su mejor respuesta q₂*(q₁). Su función de reacción es la misma que en Cournot, pero ahora se evalúa con el valor real observado, no con una conjetura."
  },
  {
    tag: "teoria",
    q: "¿Qué implica el 'compromiso irreversible' en el modelo de Stackelberg?",
    opts: [
      "El líder puede cambiar su producción si el seguidor no reacciona como esperaba",
      "La ventaja del líder solo existe si su decisión de producción no puede deshacerse una vez anunciada",
      "El seguidor está obligado por contrato a producir menos que el líder",
      "El precio de mercado queda fijo desde el periodo 1"
    ],
    ans: 1,
    exp: "Si el líder pudiera retractarse, la amenaza de producir mucho no sería creíble y el seguidor la ignoraría. Solo cuando la decisión es irreversible —capacidad instalada, contratos, anuncios públicos— la ventaja del primer movedor es real y el modelo tiene sentido."
  },
  {
    tag: "grafico",
    q: "En el gráfico de Stackelberg (ejes q_S y q_L), ¿qué representan las curvas cóncavas que se abren hacia la derecha?",
    opts: [
      "Las funciones de reacción de ambas empresas",
      "Las curvas de isobeneficio del líder: combinaciones de q_L y q_S que generan igual beneficio π₁",
      "La demanda residual del seguidor",
      "Las curvas de costo marginal de cada empresa"
    ],
    ans: 1,
    exp: "Las isobeneficio son curvas de nivel de la función π₁(q_L, q_S). Todas las combinaciones sobre una misma curva generan el mismo beneficio para el líder. Las curvas más cercanas al eje q_L (menos q_S) representan mayor beneficio para el líder."
  },
  {
    tag: "grafico",
    q: "¿Dónde se ubica el equilibrio de Stackelberg en el gráfico de isobeneficio y función de reacción del seguidor?",
    opts: [
      "En la intersección de las dos funciones de reacción (igual que en Cournot)",
      "En el punto donde la isobeneficio del líder es tangente a la curva de reacción del seguidor R₂",
      "En el punto máximo de la función de reacción del seguidor",
      "En el origen del gráfico"
    ],
    ans: 1,
    exp: "El equilibrio S se da en la tangencia entre la isobeneficio más favorable del líder y la curva de reacción del seguidor R₂. En ese punto el líder maximiza sus beneficios sabiendo que el seguidor siempre responderá sobre R₂."
  },
  {
    tag: "grafico",
    q: "En el gráfico comparativo, ¿cómo se relacionan las cantidades del líder en Stackelberg (q_L*) y en Cournot (q_L^N)?",
    opts: [
      "q_L* < q_L^N: el líder produce menos en Stackelberg que en Cournot",
      "q_L* = q_L^N: ambas cantidades son idénticas",
      "q_L* > q_L^N: el líder produce más en Stackelberg que en Cournot",
      "q_L* = Q_M: el líder produce la cantidad de monopolio"
    ],
    ans: 2,
    exp: "En el gráfico el punto S queda a la derecha del punto C respecto al eje del líder: q_L* > q_L^N. El líder expande su producción en Stackelberg para ejercer su ventaja de primer movedor y forzar al seguidor a reducir la suya."
  },
  {
    tag: "grafico",
    q: "En el espectro de estructuras de mercado, ¿qué relación existe entre cantidades y precios?",
    opts: [
      "Q_M > Q_C > Q_S > Q_CP y P_M < P_C < P_S < P_CP",
      "Q_M < Q_Cournot < Q_Stackelberg < Q_CP y P_M > P_Cournot > P_Stackelberg > P_CP",
      "Todas las estructuras producen la misma cantidad total",
      "Solo el monopolio y la competencia perfecta son extremos; Cournot y Stackelberg son idénticos"
    ],
    ans: 1,
    exp: "La cantidad aumenta y el precio cae al avanzar hacia más competencia: Q_Monopolio < Q_Cournot < Q_Stackelberg < Q_CP y P_Monopolio > P_Cournot > P_Stackelberg > P_CP. Stackelberg produce más y cobra menos que Cournot porque el líder empuja el mercado hacia mayor oferta."
  }
];

let current = 0;
let answers = new Array(10).fill(null);

function render() {
  const q = QS[current];
  const done = answers[current] !== null;
  const pct = Math.round((current + 1) / 10 * 100);

  document.getElementById("prog-fill").style.width = pct + "%";
  document.getElementById("prog-label").textContent = "Pregunta " + (current + 1) + " de 10";
  document.getElementById("prog-pct").textContent = pct + "%";
  document.getElementById("q-counter").textContent = (current + 1) + " / 10";
  document.getElementById("prev-btn").disabled = current === 0;
  document.getElementById("next-btn").disabled = !done;

  const isLast = current === 9;
  document.getElementById("next-btn").textContent = (isLast && done) ? "Ver resultados →" : "Siguiente →";

  const opts = q.opts.map((o, i) => {
    let cls = "opt-btn";
    if (done) {
      if (i === q.ans) cls += " correct";
      else if (i === answers[current]) cls += " wrong";
    }
    return `<button class="${cls}" onclick="pick(${i})" ${done ? "disabled" : ""}><strong>${String.fromCharCode(65 + i)}.</strong> ${o}</button>`;
  }).join("");

  let fb = "";
  if (done) {
    const ok = answers[current] === q.ans;
    fb = `<div class="feedback ${ok ? "ok" : "ko"}">${ok ? "✓ Correcto — " : "✗ Incorrecto — "}${q.exp}</div>`;
  }

  document.getElementById("quiz-area").innerHTML = `
    <div class="card">
      <div class="q-num">Pregunta ${current + 1}</div>
      <span class="q-tag ${q.tag === "teoria" ? "tag-teoria" : "tag-grafico"}">${q.tag === "teoria" ? "📘 Teoría" : "📊 Gráfico"}</span>
      <div class="q-text">${q.q}</div>
      <div class="options">${opts}</div>
      ${fb}
    </div>`;
}

function pick(i) {
  if (answers[current] !== null) return;
  answers[current] = i;
  document.getElementById("next-btn").disabled = false;
  if (current === 9) document.getElementById("next-btn").textContent = "Ver resultados →";
  render();
}

function navigate(d) {
  if (d === 1 && current === 9 && answers[current] !== null) {
    showResult();
    return;
  }
  current = Math.max(0, Math.min(9, current + d));
  render();
}

function showResult() {
  const score = answers.filter((a, i) => a === QS[i].ans).length;
  const teoria = answers.filter((a, i) => i < 6 && a === QS[i].ans).length;
  const grafico = answers.filter((a, i) => i >= 6 && a === QS[i].ans).length;

  let msg = "";
  let emoji = "";
  if (score >= 9) { msg = "Excelente dominio del modelo de Stackelberg. Comprendes la lógica del líder, el seguidor y el análisis gráfico a la perfección."; emoji = "🏆"; }
  else if (score >= 7) { msg = "Muy buen desempeño. Tienes una comprensión sólida del modelo. Repasa los conceptos donde fallaste para completar el dominio."; emoji = "🎯"; }
  else if (score >= 5) { msg = "Vas por buen camino. Repasa especialmente la lógica de las isobeneficio y la comparación Stackelberg vs Cournot."; emoji = "📈"; }
  else { msg = "Revisa el material nuevamente, especialmente la ventaja del primer movedor, el equilibrio gráfico y la comparación de beneficios entre modelos."; emoji = "📖"; }

  document.getElementById("nav-bar").style.display = "none";
  document.querySelector(".progress-wrap").style.display = "none";

  document.getElementById("quiz-area").innerHTML = `
    <div class="result-card">
      <div style="font-size:40px;margin-bottom:1rem">${emoji}</div>
      <div class="score-circle">
        <span class="score-num">${score}</span>
        <span class="score-den">de 10</span>
      </div>
      <div class="result-subtitle">Resultados finales</div>
      <div class="score-bars">
        <div class="score-bar-item">
          <div class="score-bar-label">Teoría</div>
          <div class="score-bar-val" style="color:var(--purple)">${teoria}/6</div>
        </div>
        <div class="score-bar-item">
          <div class="score-bar-label">Gráficos</div>
          <div class="score-bar-val" style="color:var(--teal-mid)">${grafico}/4</div>
        </div>
        <div class="score-bar-item">
          <div class="score-bar-label">Total</div>
          <div class="score-bar-val">${Math.round(score/10*100)}%</div>
        </div>
      </div>
      <div class="result-msg">${msg}</div>
      <button class="restart-btn" onclick="restart()">↺ Reiniciar cuestionario</button>
    </div>`;
}

function restart() {
  current = 0;
  answers = new Array(10).fill(null);
  document.getElementById("nav-bar").style.display = "";
  document.querySelector(".progress-wrap").style.display = "";
  document.getElementById("prev-btn").disabled = true;
  document.getElementById("next-btn").disabled = true;
  document.getElementById("next-btn").textContent = "Siguiente →";
  render();
}

render();
</script>
</body>
</html>
